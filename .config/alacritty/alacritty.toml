#[shell]
#shell = "/bin/bash"

[env]
TERM = "xterm-256color"

[window]
decorations = "None"
#opacity = 0.85

[window.padding]
x = 5
y = 5

[font]
size = 14

[font.normal]
family = "FiraMono Nerd Font"

[general]
import = [
  "~/.config/alacritty/ayu_dark.toml"
]

[[keyboard.bindings]]
key = "1"
mods = "Command"
action = "ReceiveChar"

[[keyboard.bindings]]
key = "2"
mods = "Command"
action = "ReceiveChar"

[[keyboard.bindings]]
key = "3"
mods = "Command"
action = "ReceiveChar"

[[keyboard.bindings]]
key = "4"
mods = "Command"
action = "ReceiveChar"
